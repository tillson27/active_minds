              "text": "ACTive Minds Therapy & Consulting is a collective of three Registered Social Workers — Alison Orford, Christine McInnes, and Tricia Goeldner — offering trauma-informed counselling, clinical supervision, training, and workplace consulting. The practice serves Sudbury, Manitoulin Island, and provides virtual sessions across Ontario."
            }
          },
          {
            "@type": "Question",
            "name": "Where is ACTive Minds located?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ACTive Minds offers in-person sessions in Sudbury and at 510 Perivale Rd E in Spring Bay on Manitoulin Island, Ontario. Secure virtual sessions are available to clients throughout Ontario."
            }
          },
          {
            "@type": "Question",
            "name": "How much does therapy cost?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Therapy sessions with ACTive Minds range from $150 to $200 per session, depending on the clinician and service. Sessions are typically covered by most extended health benefit plans, and receipts are provided for reimbursement."
            }
          },
          {
            "@type": "Question",
            "name": "Do you offer virtual therapy across Ontario?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. ACTive Minds offers secure, confidential virtual counselling sessions to clients anywhere in Ontario, in addition to in-person sessions in Sudbury and on Manitoulin Island."
            }
          },
          {
            "@type": "Question",
            "name": "What kinds of issues do you support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We support individuals, couples, and families navigating trauma, grief and loss, anxiety, depression, self-esteem, stress, life transitions, addiction, abuse, workplace stress, and the everyday work of building emotional balance. Our approach is grounded in evidence-based, trauma-informed therapy."
            }
          },
          {
            "@type": "Question",
            "name": "Are your social workers registered in Ontario?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. All three clinicians are Registered Social Workers (RSWs) in good standing with the Ontario College of Social Workers and Social Service Workers (OCSWSSW), with more than 55 years of combined experience."
            }
          },
          {
            "@type": "Question",
            "name": "Do you offer clinical supervision for other social workers?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. ACTive Minds provides reflective clinical supervision for Registered Social Workers, aligned with OCSWSSW standards, to support practice growth, complex case work, and ethical accountability."
